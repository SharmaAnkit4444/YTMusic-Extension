<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Music Player - Web Extension</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      width: 100%;
      height: auto;
    }

    body {
      background: transparent;
      min-height: auto;
      display: block;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
    }

    .music-player {
      width: 100%;
      min-width: 320px;
      background: linear-gradient(135deg, #1a1e2c 0%, #2a2f3f 100%);
      border-radius: 0;
      box-shadow: none;
      padding: 20px;
    }

    .song-info {
      text-align: left;
      margin-bottom: 16px;
    }

    .song-title {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: #F9F9FB;
      margin-bottom: 4px;
    }

    .artist-name {
      font-size: 0.8rem;
      font-weight: 500;
      color: #a9b2d9;
      letter-spacing: 0.2px;
      opacity: 0.85;
    }

    .progress-area {
      margin-bottom: 16px;
    }

    .progress-bar-bg {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 40px;
      height: 4px;
      width: 100%;
      cursor: pointer;
      overflow: hidden;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
    }

    .progress-fill {
      background: linear-gradient(90deg, #c084fc, #8b5cf6, #ec489a);
      width: 0%;
      height: 100%;
      border-radius: 40px;
      position: relative;
      transition: width 0.05s linear;
      box-shadow: 0 0 6px rgba(192, 132, 252, 0.6);
    }

    .time-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #b7bfe8;
      letter-spacing: 0.2px;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 16px;
    }

    .ctrl-btn {
      background: rgba(30, 34, 48, 0.7);
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3), 0 1px 1px rgba(255,255,255,0.1) inset;
    }

    .ctrl-btn svg {
      width: 18px;
      height: 18px;
      stroke: #eef2ff;
      stroke-width: 1.8;
      fill: none;
      transition: all 0.2s;
    }

    .ctrl-btn.play-pause {
      background: linear-gradient(145deg, #8b5cf6, #6d28d9);
      box-shadow: 0 4px 12px -4px rgba(107, 70, 193, 0.5);
      width: 48px;
      height: 48px;
    }

    .ctrl-btn.play-pause svg {
      stroke: white;
      stroke-width: 1.8;
      fill: white;
    }

    .ctrl-btn:hover {
      transform: translateY(-2px);
      background: rgba(50, 55, 75, 0.9);
    }

    .ctrl-btn.play-pause:hover {
      transform: scale(1.05) translateY(-1px);
    }

    .ctrl-btn:active {
      transform: translateY(1px);
    }

    .secondary-controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .sec-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #6e7aaa;
      padding: 6px 14px;
      border-radius: 40px;
      transition: all 0.18s ease;
      letter-spacing: 0.3px;
      position: relative;
    }

    .sec-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      color: #a9b2d9;
      transform: translateY(-1px);
    }

    .sec-btn:active {
      transform: scale(0.96);
    }

    .sec-btn.active {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.4), rgba(236, 72, 153, 0.3));
      border-color: #c084fc;
      color: #f3e8ff;
      box-shadow: 0 0 16px rgba(192, 132, 252, 0.5), 0 0 0 1px rgba(192, 132, 252, 0.3) inset;
      text-shadow: 0 0 4px rgba(192, 132, 252, 0.5);
      transform: scale(1.02);
    }

    .sec-btn.active::before {
      content: '';
      position: absolute;
      top: -3px;
      right: -3px;
      width: 10px;
      height: 10px;
      background: #c084fc;
      border-radius: 50%;
      box-shadow: 0 0 8px #c084fc;
      animation: glowPulse 1.5s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% {
        opacity: 0.5;
        transform: scale(0.8);
        box-shadow: 0 0 4px #c084fc;
      }
      50% {
        opacity: 1;
        transform: scale(1.2);
        box-shadow: 0 0 12px #c084fc;
      }
    }

    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      background: rgba(0, 0, 0, 0.2);
      padding: 8px 14px;
      border-radius: 60px;
    }

    .volume-icon svg {
      width: 16px;
      height: 16px;
      stroke: #b9c2ec;
    }

    .volume-slider {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      outline: none;
    }

    .volume-slider::-webkit-slider-runnable-track {
      height: 4px;
      background: transparent;
      border-radius: 10px;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: #c084fc;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 6px #c084fc;
      border: none;
      margin-top: -4px;
      position: relative;
      z-index: 2;
    }

    .volume-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .volume-slider::-moz-range-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
    }

    .volume-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      background: #c084fc;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 6px #c084fc;
      border: none;
    }

    .volume-slider::-moz-range-progress {
      height: 4px;
      background: linear-gradient(90deg, #c084fc, #8b5cf6);
      border-radius: 10px;
    }

    .ext-badge {
      text-align: center;
      margin-top: 12px;
      font-size: 0.6rem;
      color: #6f77a5;
      letter-spacing: 0.3px;
      font-weight: 500;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    @media (max-width: 400px) {
      .music-player {
        min-width: 280px;
        padding: 16px;
      }
      .ctrl-btn {
        width: 36px;
        height: 36px;
      }
      .ctrl-btn.play-pause {
        width: 44px;
        height: 44px;
      }
      .song-title {
        font-size: 1rem;
      }
      .artist-name {
        font-size: 0.7rem;
      }
      .sec-btn {
        padding: 4px 12px;
        font-size: 0.65rem;
      }
      .volume-row {
        padding: 6px 12px;
      }
    }
  </style>
</head>
<body>
<div class="music-player" id="musicPlayer">
  <div class="song-info">
    <div class="song-title" id="songTitle">Neon Echoes</div>
    <div class="artist-name" id="artistName">Luna Wavefield</div>
  </div>

  <div class="progress-area">
    <div class="progress-bar-bg" id="progressBarBg">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="time-stats">
      <span id="currentTime">0:00</span>
      <span id="durationTime">0:00</span>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="prevBtn" aria-label="Previous">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="19 20 9 12 19 4 19 20" />
        <rect x="5" y="4" width="2" height="16" />
      </svg>
    </button>
    <button class="ctrl-btn play-pause" id="playPauseBtn" aria-label="Play/Pause">
      <svg viewBox="0 0 24 24" id="playPauseIcon" stroke="currentColor" fill="currentColor">
        <polygon points="5 3 19 12 5 21 5 3" />
      </svg>
    </button>
    <button class="ctrl-btn" id="nextBtn" aria-label="Next">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="5 4 15 12 5 20 5 4" />
        <rect x="17" y="4" width="2" height="16" />
      </svg>
    </button>
  </div>

  <div class="secondary-controls">
    <button class="sec-btn" id="shuffleBtn">
      <span style="font-size: 14px;">🔀</span>
      <span>Shuffle</span>
    </button>
    <button class="sec-btn" id="repeatBtn">
      <span style="font-size: 14px;">🔁</span>
      <span>Repeat</span>
    </button>
  </div>

  <div class="volume-row">
    <div class="volume-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M3 15V9h4l5-5v16l-5-5H3z" stroke-width="1.6"/>
        <path d="M16 8a5 5 0 0 1 0 8M19 5a9 9 0 0 1 0 14" stroke-width="1.6"/>
      </svg>
    </div>
    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.75">
  </div>

  <div class="ext-badge">
    🎧 YouTube Music • Connected
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
